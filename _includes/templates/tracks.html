{% assign collection = include.collection %}
<a href="{{ collection.filename }}/" class="listitem" attr-id="{{ collection.description | downcase }}" attr-name="{{ collection.name }}" attr-description="{{ collection.description }}">
  <div class="absolute size-12 bg-white/10{% if collection.description == 'Artist' %} rounded-full{% endif %}">
    <img loading="eager" src="{% if collection.image contains 'https' %}{{ collection.image }}{% else %}https://xmp3.github.io/image/{{ collection.image }}{% endif %}" alt="{{ collection.name }}" class="fallback-image-img{% if collection.description == 'Artist' %} rounded-full{% endif %}" width="100%" height="100%" onerror="this.style.display='none';" onload="this.style.display='block';">
  </div>
  <div class="pl-16 w-full">
    <div class="truncate primary">{{ collection.name }}</div>
    <div class="truncate secondary">{{ collection.description }}</div>
  </div>
</a>

{% for track in collection.tracks %}
  <a href="{{ collection.filename }}/#{{ forloop.index }}" class="listitem" attr-id="music" attr-name="{{ track.title }}" attr-description="{{ track.artist }}">
    <div class="absolute size-12 bg-white/10">
      <img loading="eager" src="{% if track.cover contains 'https' %}{{ track.cover }}{% else %}https://xmp3.github.io/image/{{ track.cover }}{% endif %}" alt="{{ track.title }}" class="fallback-image-img" width="100%" height="100%" onerror="this.style.display='none';" onload="this.style.display='block';">
      {% include components/icons/crotchet.html class="fallback-image-icon" %}
    </div>
    <div class="pl-16 w-full">
      <div class="truncate primary">{{ track.title }}</div>
      <div class="truncate secondary">{{ track.artist }}</div>
    </div>
  </a>
{% endfor %}
